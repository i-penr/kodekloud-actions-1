name: Generate ASCII Workflow from Shell Script

on: [push, fork]

jobs:
  generate_ascii: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: List Repo files
        run: ls -ltra

      - name: Executing Shell Script
        run: |
          chmod +x ascii-script.sh
          ./ascii-script.sh


# By default, the workflow will get a default "Permission denied error". 
# File permissions will need to be aded with chmod.