name: Multiple Jobs With Artifacts

on: [push, fork]

jobs:
  build_job_1: 
    runs-on: ubuntu-latest
    steps:
      - name: Install cowsay
        run: sudo apt-get install cowsay -y

      - name: Generate ASCII Artwork
        run: cowsay -f dragon "Run for cover, I am a DRAGON....RAWR" >> dragon.txt
      
      - name: Upload Dragon Text File
        uses: actions/upload-artifact@v7
        with:
          name: dragon-text-file
          path: dragon.txt

  test_job_2:
    needs: build_job_1
    runs-on: ubuntu-latest
    steps:
      - name: Dowload Dragon Text File
        uses: actions/download-artifact@v8
        with:
          name: dragon-text-file
      
      - name: Test file Exists
        run: grep -ri "dragon" dragon.txt
  
  deploy_job_3:
    needs: [test_job_2]
    runs-on: ubuntu-latest
    steps:
      - name: Dowload Dragon Text File
        uses: actions/download-artifact@v8
        with:
          name: dragon-text-file

      - name: Read File
        run: cat dragon.txt

      - name: Deploy
        run: echo "Deploying..."
